<section class="match-menu" aria-label="Menu da partida">
  <header class="match-menu__header">
    <div>
      <span>Tempo</span>
      <strong>{{ data.duration }}</strong>
    </div>
    <div>
      <span>Local</span>
      <strong>{{ data.location }}</strong>
    </div>
  </header>

  <mat-nav-list>
    <button mat-list-item type="button" (click)="close('history')">
      <mat-icon matListItemIcon>history</mat-icon>
      <span matListItemTitle>Historico</span>
    </button>
    <button mat-list-item type="button" (click)="close('data')">
      <mat-icon matListItemIcon>folder</mat-icon>
      <span matListItemTitle>Dados</span>
    </button>
    <button mat-list-item type="button" (click)="close('finish')">
      <mat-icon matListItemIcon>flag</mat-icon>
      <span matListItemTitle>Finalizar</span>
    </button>
    <button mat-list-item type="button" (click)="close('settings')">
      <mat-icon matListItemIcon>settings</mat-icon>
      <span matListItemTitle>Config.</span>
    </button>
    <button mat-list-item type="button" (click)="close('dice')">
      <mat-icon matListItemIcon>casino</mat-icon>
      <span matListItemTitle>Dado</span>
    </button>
    <button mat-list-item type="button" (click)="close('reset')">
      <mat-icon matListItemIcon>refresh</mat-icon>
      <span matListItemTitle>Resetar</span>
    </button>
    <button mat-list-item type="button" (click)="close('newMatch')">
      <mat-icon matListItemIcon>add_circle</mat-icon>
      <span matListItemTitle>Nova partida</span>
    </button>
  </mat-nav-list>
</section>
