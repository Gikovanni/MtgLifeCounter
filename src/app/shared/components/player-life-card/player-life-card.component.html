<article [class]="'arena-player ' + layoutClassName" [style.backgroundColor]="player.color">
  @if (player.backgroundImageDataUrl) {
    <div
      class="arena-player__background"
      [class]="orientationClassName"
      [style.backgroundImage]="backgroundImageStyle"
      aria-hidden="true"
    ></div>
  }

  <div class="arena-player__tools">
    <button mat-mini-fab type="button" aria-label="Adicionar imagem" (click)="fileInput.click()">
      <mat-icon>image</mat-icon>
    </button>
    <input #fileInput type="file" accept="image/*" hidden (change)="handleBackgroundImage($event)" />
  </div>

  <div class="arena-player__inner" [class]="orientationClassName">
    <input
      matInput
      class="arena-player__name"
      [attr.aria-label]="'Nome de ' + (player.name || 'jogador')"
      [value]="player.name"
      placeholder="Jogador"
      (input)="rename.emit(inputValue($event))"
    />
    <div class="arena-player__life">{{ player.life }}</div>
    @if (pendingLifeDelta !== 0) {
      <div
        class="arena-player__pending-life"
        [class.arena-player__pending-life--positive]="pendingLifeDelta > 0"
        [class.arena-player__pending-life--negative]="pendingLifeDelta < 0"
      >
        {{ pendingLifeDelta > 0 ? '+' + pendingLifeDelta : pendingLifeDelta }}
      </div>
    }
  </div>

  <div class="arena-player__actions" [attr.aria-label]="'Ajustar vida de ' + (player.name || 'jogador')">
    <button mat-fab type="button" class="arena-player__life-button" (click)="lifeChange.emit(-1)">
      <span aria-hidden="true">-</span>
    </button>
    <button mat-fab type="button" class="arena-player__life-button" (click)="lifeChange.emit(1)">
      <span aria-hidden="true">+</span>
    </button>
  </div>
</article>
